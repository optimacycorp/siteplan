server {
    listen 80;
    listen [::]:80;
    server_name siteplan.gomil.com;

    root /var/www/siteplan.gomil.com/current;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/siteplan.gomil.com/current;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
